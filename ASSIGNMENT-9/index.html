<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Box Model</title>
  <style>
    body {
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      margin: 40px;
      border: 4px solid #2c3e50;
      padding: 30px;
      background-color: #3498db;
      color: white;
      font-size: 18px;
      font-family: Arial, sans-serif;
      width: 200px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="box">
    Hello, Box Model!
  </div>
</body>
</html>
