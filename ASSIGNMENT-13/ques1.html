<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <style>

        h1 {
            color: blue;
            border: 3px solid red;
        }

        body {
            background-color: lightyellow;
        }

        .bg-image {
            background-image: url("https://via.placeholder.com/200");
            height: 200px;
            width: 200px;
        }

  
        p {
            font-family: Arial;
            font-size: 18px;
        }

        .text-style {
            font-weight: bold;
            font-style: italic;
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <h1>Welcome to CSS Styling</h1>

    <p>This paragraph shows font styling.</p>

    <p class="text-style">This text is bold, italic and underlined.</p>

    <div class="bg-image"></div>

</body>
</html>
