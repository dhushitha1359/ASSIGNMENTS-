<!DOCTYPE html>
<html>
<head>
  <title>Nested Lists</title>
</head>
<body>

<!-- Unordered List -->
<h3>Fruits</h3>
<ul>
  <li>Apple</li>
  <li>Banana</li>
  <li>Orange</li>
</ul>

<!-- Ordered List -->
<h3>Steps to Make Tea</h3>
<ol>
  <li>Boil water</li>
  <li>Add tea powder</li>
  <li>Add milk</li>
  <li>Serve</li>
</ol>

<!-- Nested List -->
<h3>Course Structure</h3>
<ul>
  <li>Frontend
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </li>

  <li>Backend
    <ol>
      <li>Python</li>
      <li>Java</li>
      <li>Node.js</li>
    </ol>
  </li>

  <li>Database
    <ul>
      <li>MySQL</li>
      <li>MongoDB</li>
    </ul>
  </li>
</ul>

</body>
</html>
