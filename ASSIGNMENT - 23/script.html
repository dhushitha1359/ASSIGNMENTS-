<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Example</title>
</head>
<body>

<!-- 1. Change Text -->
<p id="demo">Old Text</p>
<button onclick="changeText()">Change Text</button>

<br><br>

<!-- 2. Change Style -->
<p id="styleText">Hello World</p>
<button onclick="changeStyle()">Change Color</button>

<br><br>

<!-- 3. Change Content -->
<p id="para">Hello</p>
<button onclick="changeContent()">Change Content</button>

<br><br>

<!-- 4. Change Color and Font Size -->
<p id="text">This is a paragraph</p>
<button onclick="changeAppearance()">Change Color & Size</button>

<script>
// 1. Change text
function changeText() {
    document.getElementById("demo").innerText = "New Text";
}

// 2. Change style
function changeStyle() {
    let element = document.getElementById("styleText");
    element.style.color = "blue";
}

// 3. Change content
function changeContent() {
    document.getElementById("para").innerHTML = "Welcome!";
}

// 4. Change color and font size
function changeAppearance() {
    let text = document.getElementById("text");
    text.style.color = "red";
    text.style.fontSize = "24px";
}
</script>

</body>
</html>
