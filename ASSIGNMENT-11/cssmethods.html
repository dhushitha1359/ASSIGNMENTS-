<!DOCTYPE html>
<html>
<head>
    <title>CSS Methods Example</title>

    <!-- Internal CSS -->
    <style>
        .internal {
            background-color: lightblue;
            color: darkblue;
            padding: 10px;
            margin: 10px;
        }
    </style>

    <!-- External CSS link -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Inline CSS -->
    <div style="background-color: lightgreen; color: darkgreen; padding: 10px; margin: 10px;">
        <h2>Inline CSS</h2>
        <p>This section is styled using inline CSS.</p>
    </div>

    <!-- Internal CSS -->
    <div class="internal">
        <h2>Internal CSS</h2>
        <p>This section is styled using internal CSS.</p>
    </div>

    <!-- External CSS -->
    <div class="external">
        <h2>External CSS</h2>
        <p>This section is styled using external CSS.</p>
    </div>

</body>
</html>
